name: Full Backup Music Sources (Anti-Deletion)

on:
  # schedule:
    # - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          lfs: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git LFS
        run: |
          git lfs install
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Read config and backup all repositories
        shell: bash
        run: |
          DATE=$(date +%Y-%m-%d)
          WORKSPACE=$(pwd)
          SKIPPED_COUNT=0
          BACKUP_COUNT=0
          
          if [ ! -f "config.ini" ]; then
            echo "❌ 错误: 未找到 config.ini 文件"
            exit 1
          fi
          
          echo "📅 今日备份日期: $DATE"
          
          while IFS= read -r repo_url || [[ -n "$repo_url" ]]; do
            [[ -z "$repo_url" || "$repo_url" =~ ^# ]] && continue
            
            repo_url=$(echo "$repo_url" | xargs)
            repo_name=$(basename "$repo_url" .git)
            backup_dir="$WORKSPACE/backups/$repo_name"
            backup_file="$backup_dir/${DATE}.tar.gz"
            
            echo ""
            echo "🔍 $repo_name"
            
            # 检查今日备份是否已存在
            if [ -f "$backup_file" ]; then
              echo "  ⏭️  跳过: 今日备份已存在"
              SKIPPED_COUNT=$((SKIPPED_COUNT + 1))
              continue
            fi
            
            mkdir -p "$backup_dir"
            
            temp_dir=$(mktemp -d)
            
            # 完整克隆
            echo "  📦 克隆仓库..."
            if ! git clone --bare "$repo_url" "$temp_dir/repo.git" 2>&1; then
              echo "  ❌ 克隆失败"
              rm -rf "$temp_dir"
              continue
            fi
            
            # 转为普通仓库
            git clone "$temp_dir/repo.git" "$temp_dir/repo" 2>&1
            
            cd "$temp_dir/repo"
            
            # 拉取LFS文件
            if git lfs ls-files 2>/dev/null | grep -q .; then
              echo "  🔄 拉取LFS文件..."
              git lfs fetch --all 2>&1
              git lfs checkout 2>&1
            fi
            
            # 完全打包
            cd "$temp_dir"
            tar -czf "$backup_file" "repo"
            
            SIZE=$(du -h "$backup_file" | cut -f1)
            echo "  ✅ 完成: $SIZE"
            
            rm -rf "$temp_dir"
            BACKUP_COUNT=$((BACKUP_COUNT + 1))
            cd "$WORKSPACE"
            
          done < config.ini
          
          echo ""
          echo "📊 完成: $BACKUP_COUNT 个备份, $SKIPPED_COUNT 个跳过"

      - name: Clean old backups
        run: |
          for project_dir in backups/*/; do
            [ -d "$project_dir" ] || continue
            cd "$project_dir"
            ls -1 *.tar.gz 2>/dev/null | sort -r | tail -n +6 | xargs -r rm -f
            cd - > /dev/null
          done

      - name: Commit and push
        run: |
          git lfs track "backups/**/*.tar.gz" 2>/dev/null || true
          git add .gitattributes backups/ 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "⏹️  无变更"
            exit 0
          fi
          
          git commit -m "Full backup: $(date +%Y-%m-%d)"
          git push
